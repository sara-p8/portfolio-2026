<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payroll Calendar · Sara Papa</title>
  <link rel="icon" type="image/svg+xml" href="sp-logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F7F4EF;
      --ink: #1C1A18;
      --ink-2: #706A64;
      --ink-3: #6A6460;
      --accent: #8C5E4A;
      --line: #E4DED7;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Figtree', sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .gate {
      text-align: center;
      padding: 40px;
    }
    .gate-logo {
      width: 56px;
      height: 56px;
      margin: 0 auto 32px;
      opacity: 0.5;
    }
    .gate-label {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-3);
      margin-bottom: 24px;
    }
    .gate-input-row {
      display: inline-flex;
      align-items: center;
      border-bottom: 1px solid var(--line);
      gap: 12px;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    .gate-input-row:focus-within { border-color: var(--ink-2); }
    .gate-input {
      font-family: 'Figtree', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      text-align: center;
      background: transparent;
      border: none;
      color: var(--ink);
      padding: 8px 0;
      width: 100px;
      outline: none;
    }
    .gate-input::placeholder { color: var(--line); }
    .gate-unlock {
      font-family: 'Figtree', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-3);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      white-space: nowrap;
      transition: color 0.2s;
    }
    .gate-unlock:hover { color: var(--accent); }
    .gate-error {
      font-size: 0.75rem;
      color: var(--accent);
      margin-top: 4px;
      min-height: 1.2em;
    }
    .gate-contact {
      display: inline-block;
      margin-top: 28px;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      color: var(--ink-3);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Figtree', sans-serif;
      padding: 0;
      transition: color 0.2s;
    }
    .gate-contact:hover { color: var(--accent); }

    .gate-request {
      display: none;
      margin-top: 24px;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .gate-request.visible { display: flex; }

    .gate-request-input {
      font-family: 'Figtree', sans-serif;
      font-size: 0.88rem;
      text-align: center;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--line);
      color: var(--ink);
      padding: 8px 0;
      width: 220px;
      outline: none;
    }
    .gate-request-input::placeholder { color: var(--line); }

    .gate-request-btn {
      font-family: 'Figtree', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      transition: opacity 0.2s;
    }
    .gate-request-btn:hover { opacity: 0.6; }

    .gate-confirm {
      display: none;
      margin-top: 24px;
      font-size: 0.78rem;
      color: var(--ink-3);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="gate">
    <svg class="gate-logo" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M15.7108 44.8033L39.7025 11.9988" stroke="#F7BDD1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M25.715 26.6234C25.715 26.6234 13.4172 19.1992 20.2624 9.83957C27.1076 0.479936 37.6183 10.3476 37.6183 10.3476" stroke="#906E5D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M30.2981 29.3587C30.2981 29.3587 41.9999 37.5979 35.7102 46.198C29.4205 54.798 18.3176 45.74 18.3176 45.74" stroke="#906E5D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <p class="gate-label">Password required</p>
    <div class="gate-input-row">
      <input class="gate-input" id="pwd" type="password" placeholder="····" maxlength="20" autocomplete="off" autofocus />
      <button class="gate-unlock" id="unlockBtn">Enter</button>
    </div>
    <p class="gate-error" id="err"></p>

    <button class="gate-contact" id="requestBtn">No password? Request access</button>

    <div class="gate-request" id="requestForm">
      <input class="gate-request-input" id="requestEmail" type="email" placeholder="your@email.com" autocomplete="email" />
      <button class="gate-request-btn" id="requestSubmit">send request →</button>
    </div>

    <p class="gate-confirm" id="requestConfirm">Got it. Sara will be in touch shortly.</p>
  </div>

    async function unlock(password) {
      const raw = Uint8Array.from(atob(BLOB), c => c.charCodeAt(0));
      const salt = raw.slice(0, 16);
      const iv   = raw.slice(16, 28);
      const data = raw.slice(28);

      const enc = new TextEncoder().encode(password);
      const keyMaterial = await crypto.subtle.importKey("raw", enc, "PBKDF2", false, ["deriveKey"]);
      const key = await crypto.subtle.deriveKey(
        { name: "PBKDF2", salt, iterations: 200000, hash: "SHA-256" },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );

      try {
        const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
        const html = new TextDecoder().decode(decrypted);
        document.open();
        document.write(html);
        document.close();
      } catch {
        return false;
      }
      return true;
    }

    const input = document.getElementById("pwd");
    const err   = document.getElementById("err");

    async function tryUnlock() {
      if (input.value.length === 0) return;
      err.textContent = "";
      input.disabled = true;
      document.getElementById("unlockBtn").disabled = true;
      const ok = await unlock(input.value);
      if (!ok) {
        err.textContent = "Incorrect password";
        input.value = "";
        input.disabled = false;
        document.getElementById("unlockBtn").disabled = false;
        input.focus();
      }
    }

    input.addEventListener("input", () => {
      if (input.value.length === 4) tryUnlock();
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") tryUnlock();
    });

    document.getElementById("unlockBtn").addEventListener("click", tryUnlock);

    // ── Request access form ──────────────────
    // Replace YOUR_FORM_ID below with your Formspree form ID
    // Get one free at https://formspree.io → New Form → copy the ID from the endpoint
    const FORMSPREE_ID = "mvzljvda";

    document.getElementById("requestBtn").addEventListener("click", () => {
      document.getElementById("requestBtn").style.display = "none";
      document.getElementById("requestForm").classList.add("visible");
      document.getElementById("requestEmail").focus();
    });

    async function submitRequest() {
      const email = document.getElementById("requestEmail").value.trim();
      if (!email) return;
      const btn = document.getElementById("requestSubmit");
      btn.textContent = "sending…";
      btn.disabled = true;
      try {
        const fd = new FormData();
        fd.append("email", email);
        fd.append("_replyto", email);
        fd.append("message", "Requesting access to Payroll Calendar case study");
        const res = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
          method: "POST",
          headers: { "Accept": "application/json" },
          body: fd
        });
        if (!res.ok) throw new Error("failed");
      } catch (e) {
        btn.textContent = "send request →";
        btn.disabled = false;
        document.getElementById("requestConfirm").textContent = "Something went wrong — email sarapapa308@gmail.com directly.";
        document.getElementById("requestConfirm").style.display = "block";
        return;
      }
      document.getElementById("requestForm").style.display = "none";
      document.getElementById("requestConfirm").style.display = "block";
    }

    document.getElementById("requestSubmit").addEventListener("click", submitRequest);
    document.getElementById("requestEmail").addEventListener("keydown", (e) => {
      if (e.key === "Enter") submitRequest();
    });
  </script>
</body>
